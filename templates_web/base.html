<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Isokratis{% endblock %}</title>
  <style>
    :root {
      --bg: #eef1f3; --panel: #ffffff; --border: #d3dade; --ink: #1f2a30;
      --muted: #6a7a82; --accent: #2f5d62; --accent-ink: #ffffff;
      --accent-soft: #e2edec; --danger: #b3261e; --ok: #1e7d4f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, Segoe UI, Roboto, "Noto Sans", sans-serif;
      color: var(--ink); background: var(--bg); font-size: 14px;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header.topbar {
      background: var(--accent); color: var(--accent-ink); padding: 10px 18px;
      display: flex; align-items: center; gap: 16px;
    }
    header.topbar h1 { font-size: 17px; margin: 0; font-weight: 600; }
    header.topbar a { color: var(--accent-ink); opacity: .9; }
    .container { max-width: 1100px; margin: 0 auto; padding: 22px 18px; }
    .btn {
      display: inline-block; padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--panel); color: var(--ink); cursor: pointer; font-size: 14px;
    }
    .btn:hover { border-color: var(--accent); text-decoration: none; }
    .btn.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
    .btn.danger { color: var(--danger); border-color: var(--danger); }
    .btn:disabled { opacity: .5; cursor: default; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; }
    input, select, textarea {
      font: inherit; padding: 7px 9px; border: 1px solid var(--border); border-radius: 6px;
      width: 100%; background: #fff; color: var(--ink);
    }
    textarea { resize: vertical; min-height: 64px; }
    label { display: block; font-size: 12px; color: var(--muted); margin: 0 0 4px; }
    .field { margin-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
    th { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .03em; }
    .muted { color: var(--muted); }
    .tag { display: inline-block; background: #eef2f7; color: var(--accent); border-radius: 4px;
           padding: 2px 8px; font-size: 12px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="topbar">
    <h1><a href="{{ url_for('index') }}">Isokratis</a></h1>
    <span style="opacity:.8">Greek legislation · Akoma Ntoso 3.0</span>
    {% block topbar %}{% endblock %}
  </header>
  {% block body %}{% endblock %}
</body>
</html>
